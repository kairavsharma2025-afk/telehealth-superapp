# =====================================================================
# TELEHEALTH SUPERAPP — local development stack
#
# Phase 2: databases. Phase 3: MinIO (S3-compatible) for upload-service.
# Node services run on the host via npm workspaces, not in compose yet.
# A single nginx reverse proxy joins in Phase 7.
#
# Usage:
#   npm run infra:up               # start postgres + mongo + minio
#   npm run infra:down             # stop everything
#   docker compose ps              # see status
#   docker compose logs -f mongo   # tail logs
#   docker compose down -v         # stop AND wipe data (destructive)
# =====================================================================

services:

  # -------------------------------------------------------------------
  # PostgreSQL 16 — primary relational DB
  # Stores: users, doctors, patients, appointments, prescriptions,
  #         payments, audit logs.
  # -------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: telehealth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-telehealth}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-telehealth_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-telehealth}
      # Use scram-sha-256 instead of legacy md5 (Postgres 14+ default)
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      # host:container — only bind to localhost, never 0.0.0.0 in dev
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-telehealth} -d ${POSTGRES_DB:-telehealth}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - telehealth-net

  # -------------------------------------------------------------------
  # MongoDB 7 — secondary unstructured DB
  # Stores: chat_messages, ai_conversations, notification_logs,
  #         flexible patient questionnaires.
  # -------------------------------------------------------------------
  mongo:
    image: mongo:7
    container_name: telehealth-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-telehealth}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-telehealth_dev_pw}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-telehealth_logs}
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - telehealth-net

  # -------------------------------------------------------------------
  # MinIO — S3-compatible object store for upload-service (Phase 3).
  # Phase 7 swaps this out for real AWS S3; the upload-service code
  # stays the same — only the endpoint env var flips.
  # -------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: telehealth-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "127.0.0.1:9000:9000"  # S3 API
      - "127.0.0.1:9001:9001"  # web console (http://localhost:9001)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - telehealth-net

# -------------------------------------------------------------------
# Named volumes — Docker manages where these live on disk.
# Survives `docker compose down`. Wiped only on `down -v`.
# -------------------------------------------------------------------
volumes:
  postgres_data:
    name: telehealth_postgres_data
  mongo_data:
    name: telehealth_mongo_data
  minio_data:
    name: telehealth_minio_data

# -------------------------------------------------------------------
# Custom network — services talk to each other by service name
# (e.g., auth-service connects to "postgres:5432", not localhost).
# -------------------------------------------------------------------
networks:
  telehealth-net:
    name: telehealth-net
    driver: bridge
