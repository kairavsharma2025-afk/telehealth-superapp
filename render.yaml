# Render Blueprint for the telehealth-superapp backend.
#
# Provisions Postgres + 6 Node services (free plan). After the initial
# deploy completes:
#   1. Get the api-gateway URL from Render (https://telehealth-api-gateway-xxx.onrender.com)
#   2. Set VITE_API_URL on Vercel for web-doctor + web-admin to that URL
#   3. Set EXPO_PUBLIC_API_BASE on Vercel for mobile-patient to that URL
#   4. Set the AUTH_URL/USER_URL/etc env vars on api-gateway to the actual
#      hostnames of the other services (Render generates these on first deploy)
#   5. Run migrations once (see "After first deploy" notes below)
#
# Free-plan caveats:
#   - Web services sleep after 15 min idle. First request after sleep is ~30s.
#   - Postgres free tier expires after 90 days; back up before then.

databases:
  - name: telehealth-postgres
    plan: free
    databaseName: telehealth
    user: telehealth

services:
  # ----- internal services -----
  - type: web
    name: telehealth-auth
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build -w @telehealth/shared && npm run build -w @telehealth/auth-service
    startCommand: npm run start -w @telehealth/auth-service
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: telehealth-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false

  - type: web
    name: telehealth-user
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build -w @telehealth/shared && npm run build -w @telehealth/user-service
    startCommand: npm run start -w @telehealth/user-service
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: telehealth-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false

  - type: web
    name: telehealth-appointment
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build -w @telehealth/shared && npm run build -w @telehealth/appointment-service
    startCommand: npm run start -w @telehealth/appointment-service
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: telehealth-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false

  - type: web
    name: telehealth-upload
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build -w @telehealth/shared && npm run build -w @telehealth/upload-service
    startCommand: npm run start -w @telehealth/upload-service
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: telehealth-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false
      # Cloudflare R2 — fill these in via Render dashboard after creating
      # the bucket + API token. S3_ENDPOINT looks like:
      #   https://<account-id>.r2.cloudflarestorage.com
      - key: S3_ENDPOINT
        sync: false
      - key: S3_PUBLIC_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_FORCE_PATH_STYLE
        value: "false"

  - type: web
    name: telehealth-notification
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build -w @telehealth/shared && npm run build -w @telehealth/notification-service
    startCommand: npm run start -w @telehealth/notification-service
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: telehealth-postgres
          property: connectionString
      - key: JWT_ACCESS_SECRET
        sync: false

  # ----- public-facing gateway -----
  - type: web
    name: telehealth-api-gateway
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: npm install && npm run build -w @telehealth/shared && npm run build -w @telehealth/api-gateway
    startCommand: npm run start -w @telehealth/api-gateway
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_ACCESS_SECRET
        sync: false
      # After the first deploy, Render assigns each service a hostname.
      # Edit these in the dashboard to e.g.
      # https://telehealth-auth-xxx.onrender.com etc.
      - key: AUTH_URL
        sync: false
      - key: USER_URL
        sync: false
      - key: APPOINTMENT_URL
        sync: false
      - key: UPLOAD_URL
        sync: false
      - key: NOTIFICATION_URL
        sync: false
