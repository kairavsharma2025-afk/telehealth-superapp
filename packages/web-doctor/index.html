<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      type="image/svg+xml"

    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Vela Health — Doctor Console</title>
    <script>
      // Synchronous pre-React sign-out hook. If the URL carries
      // ?auth_clear=1 (the sidebar / Profile sign-out anchor href, or
      // someone typing /signout), wipe localStorage and force-load a
      // clean /login. Runs BEFORE the React bundle even parses, so any
      // bundle-level / HMR weirdness can't swallow it.
      (function () {
        try {
          var url = new URL(window.location.href);
          if (
            url.searchParams.get("auth_clear") === "1" ||
            url.pathname === "/signout"
          ) {
            localStorage.removeItem("telehealth.accessToken");
            localStorage.removeItem("telehealth.refreshToken");
            localStorage.removeItem("telehealth.user");
            window.location.replace("/login");
          }
        } catch (e) {
          // Fail open — let React render. Worst case the user just
          // sees the form they were on.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
